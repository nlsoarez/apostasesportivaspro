openapi: 3.1.0
info:
  title: Apostas Esportivas Pro API
  version: "6.0"
  description: |
    API profissional integrada com Sportradar Soccer API v4 para análises esportivas completas.

    ## Importante: IDs no formato Sportradar (URNs)
    Esta API usa identificadores no formato URN do Sportradar:
    - Competição: `sr:competition:325` (Brasileirão Série A)
    - Time: `sr:competitor:1234`
    - Jogo: `sr:sport_event:12345`
    - Temporada: `sr:season:106479`

    ## Como começar
    1. Use `/competitions` para listar competições e seus IDs
    2. Use `/seasons?competition=sr:competition:325` para obter o ID da temporada atual
    3. Use `/fixtures?date=2025-03-01` para listar jogos do dia
    4. Os IDs de times e jogos aparecem nas respostas dos endpoints acima

    ## Competições principais
    - Brasileirão Série A: `sr:competition:325`
    - Premier League: `sr:competition:17`
    - Champions League: `sr:competition:7`
    - Copa Libertadores: `sr:competition:384`

    ## Rate limit
    Trial Sportradar: 1 requisição/segundo, 1.000 req/dia
  contact:
    name: API Support
    url: https://github.com/nlsoarez/apostasesportivaspro
  license:
    name: Open Source - Uso Educacional
    url: https://github.com/nlsoarez/apostasesportivaspro

servers:
  - url: https://apostasesportivaspro.vercel.app
    description: Servidor de Produção (Vercel)

tags:
  - name: health
    description: Monitoramento e status da API
  - name: competitions
    description: Competições e temporadas disponíveis
  - name: fixtures
    description: Jogos e partidas
  - name: standings
    description: Classificação e tabelas
  - name: teams
    description: Times e estatísticas
  - name: players
    description: Jogadores e artilheiros
  - name: predictions
    description: Probabilidades e previsões (Sportradar)
  - name: analysis
    description: Análises profissionais
  - name: news
    description: Notícias e contexto

paths:
  /:
    get:
      summary: Documentação da API
      description: Retorna informações sobre a API, provider e lista de endpoints disponíveis
      operationId: getApiInfo
      tags:
        - health
      responses:
        "200":
          description: Informações da API
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    example: true
                  name:
                    type: string
                    example: "Apostas Esportivas Pro API"
                  version:
                    type: string
                    example: "6.0"
                  provider:
                    type: string
                    example: "Sportradar Soccer API v4"
                  nota_ids:
                    type: string
                    example: "Use /competitions para listar URNs disponíveis"

  /health:
    get:
      summary: Verifica status da API
      description: Health check com teste de conectividade Sportradar
      operationId: checkHealth
      tags:
        - health
      responses:
        "200":
          description: API operacional
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "API operacional"
                  provider:
                    type: string
                    example: "Sportradar Soccer API v4"
                  sportradar_status:
                    type: string
                    enum: [connected, error, invalid_key, not_configured]
                    example: "connected"

  /competitions:
    get:
      summary: Lista competições suportadas
      description: |
        Retorna todas as competições disponíveis com seus IDs (URNs) no formato Sportradar.
        Use estes IDs como parâmetro `competition` nos outros endpoints.
      operationId: getCompetitions
      tags:
        - competitions
      responses:
        "200":
          description: Lista de competições suportadas
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    example: true
                  total:
                    type: integer
                    example: 20
                  competitions:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                          example: "sr:competition:325"
                        name:
                          type: string
                          example: "Brasileirao Serie A"
                  categories:
                    type: object
                    properties:
                      brasil:
                        type: array
                        items:
                          type: string
                        example: ["sr:competition:325", "sr:competition:390"]
                      europa:
                        type: array
                        items:
                          type: string
                        example: ["sr:competition:17", "sr:competition:8"]
                  nota:
                    type: string
                    example: "Use o 'id' como parâmetro 'competition' nos outros endpoints"

  /leagues:
    get:
      summary: Alias para /competitions (compatibilidade)
      description: Redireciona para /competitions. Use /competitions para a lista atualizada de URNs.
      operationId: getLeagues
      tags:
        - competitions
      responses:
        "200":
          description: Lista de competições (mesmo que /competitions)
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    example: true
                  total:
                    type: integer
                    example: 20
                  competitions:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                          example: "sr:competition:325"
                        name:
                          type: string
                          example: "Brasileirao Serie A"
                  categories:
                    type: object
                    properties:
                      brasil:
                        type: array
                        items:
                          type: string
                      europa:
                        type: array
                        items:
                          type: string
                  nota:
                    type: string
                    example: "Use o 'id' como parâmetro 'competition' nos outros endpoints"

  /seasons:
    get:
      summary: Lista temporadas de uma competição
      description: |
        Retorna as temporadas disponíveis para uma competição específica.
        Use o `id` da temporada como parâmetro `season` em outros endpoints.
      operationId: getSeasons
      tags:
        - competitions
      parameters:
        - name: competition
          in: query
          required: true
          description: URN da competição (ex. sr:competition:325)
          schema:
            type: string
            example: "sr:competition:325"
      responses:
        "200":
          description: Lista de temporadas disponíveis
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    example: true
                  competition:
                    type: string
                    example: "sr:competition:325"
                  total:
                    type: integer
                    example: 5
                  seasons:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                          example: "sr:season:106479"
                        name:
                          type: string
                          example: "Brasileirao Serie A 2025"
                        year:
                          type: string
                          example: "2025"
                        start_date:
                          type: string
                          example: "2025-04-01"
                        end_date:
                          type: string
                          example: "2025-12-07"
                  nota:
                    type: string
                    example: "Use o 'id' da temporada como parâmetro 'season' nos outros endpoints"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalError"

  /fixtures:
    get:
      summary: Lista jogos por data — PRIMEIRO PASSO OBRIGATÓRIO
      description: "SEMPRE chame primeiro. Retorna jogos do dia com URNs reais (mandante_id, visitante_id, competicao_id) para usar em getAnalysisComplete. Chame imediatamente ao receber qualquer pedido de análise."
      operationId: getFixtures
      tags:
        - fixtures
      parameters:
        - name: date
          in: query
          required: false
          description: Data dos jogos no formato YYYY-MM-DD (padrão = hoje)
          schema:
            type: string
            format: date
            example: "2025-04-20"
        - name: competition
          in: query
          required: false
          description: URN da competição para filtrar resultados (ex. sr:competition:325)
          schema:
            type: string
            example: "sr:competition:325"
      responses:
        "200":
          description: Lista de jogos do dia
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    example: true
                  date:
                    type: string
                    example: "2025-04-20"
                  total:
                    type: integer
                    example: 12
                  jogos:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                          example: "sr:sport_event:45678901"
                        data:
                          type: string
                          format: date-time
                          example: "2025-04-20T20:00:00+00:00"
                        status:
                          type: string
                          enum: [NS, LIVE, 1H, HT, 2H, ET, PEN, FT, PST, CANC, ABD]
                          example: "NS"
                        minuto:
                          type: string
                          nullable: true
                          example: "67"
                        competicao:
                          type: string
                          example: "Brasileirao Serie A"
                        competicao_id:
                          type: string
                          example: "sr:competition:325"
                        mandante:
                          type: string
                          example: "Flamengo"
                        mandante_id:
                          type: string
                          nullable: true
                          example: "sr:competitor:4783"
                        visitante:
                          type: string
                          example: "Palmeiras"
                        visitante_id:
                          type: string
                          nullable: true
                          example: "sr:competitor:4785"
                        placar:
                          type: string
                          nullable: true
                          example: "2x1"
        "500":
          $ref: "#/components/responses/InternalError"

  /fixtures/headtohead:
    get:
      summary: Histórico de confrontos diretos (H2H)
      description: |
        Retorna os últimos confrontos entre dois times e os próximos jogos marcados.
        Use os IDs de time (sr:competitor:XXX) encontrados nas respostas de /fixtures ou /standings.
      operationId: getHeadToHead
      tags:
        - fixtures
      parameters:
        - name: team1
          in: query
          required: true
          description: URN do time 1 (ex. sr:competitor:1234)
          schema:
            type: string
            example: "sr:competitor:1234"
        - name: team2
          in: query
          required: true
          description: URN do time 2 (ex. sr:competitor:5678)
          schema:
            type: string
            example: "sr:competitor:5678"
      responses:
        "200":
          description: Histórico de confrontos
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    example: true
                  team1:
                    type: string
                    example: "sr:competitor:1234"
                  team2:
                    type: string
                    example: "sr:competitor:5678"
                  total_historico:
                    type: integer
                    example: 10
                  resultados:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                          example: "sr:sport_event:12345"
                        data:
                          type: string
                          format: date-time
                        mandante:
                          type: string
                          example: "Flamengo"
                        visitante:
                          type: string
                          example: "Palmeiras"
                        placar:
                          type: string
                          example: "2x1"
                        status:
                          type: string
                          example: "FT"
                  proximos:
                    type: array
                    description: Próximos confrontos agendados
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        data:
                          type: string
                        mandante:
                          type: string
                        visitante:
                          type: string
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalError"

  /fixtures/live:
    get:
      summary: Jogos ao vivo no momento
      description: Lista os top 20 jogos que estão acontecendo agora com placar e minuto
      operationId: getLiveFixtures
      tags:
        - fixtures
      responses:
        "200":
          description: Jogos ao vivo
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    example: true
                  total:
                    type: integer
                    example: 8
                  partidas:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                          example: "sr:sport_event:45678901"
                        status:
                          type: string
                          example: "2H"
                        match_status:
                          type: string
                          example: "2nd_half"
                        minuto:
                          type: string
                          example: "67"
                        competicao:
                          type: string
                          example: "Brasileirao Serie A"
                        competicao_id:
                          type: string
                          example: "sr:competition:325"
                        mandante:
                          type: string
                          example: "Flamengo"
                        visitante:
                          type: string
                          example: "Palmeiras"
                        placar:
                          type: string
                          example: "1x0"
                  timestamp:
                    type: string
                    format: date-time
        "500":
          $ref: "#/components/responses/InternalError"

  /fixtures/live/analysis:
    get:
      summary: Análise completa de jogo ao vivo
      description: |
        Análise profissional de jogo em andamento incluindo:
        - Placar e minuto atual
        - Estatísticas em tempo real (via Sportradar summary)
        - Fator Must Win
        - Sugestões contextualizadas de apostas ao vivo
      operationId: getLiveAnalysis
      tags:
        - fixtures
        - analysis
      parameters:
        - name: fixture
          in: query
          required: true
          description: URN do jogo ao vivo (ex. sr:sport_event:12345)
          schema:
            type: string
            example: "sr:sport_event:45678901"
      responses:
        "200":
          description: Análise completa do jogo ao vivo
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    example: true
                  jogo:
                    type: object
                    properties:
                      id:
                        type: string
                        example: "sr:sport_event:45678901"
                      status:
                        type: string
                        example: "2H"
                      match_status:
                        type: string
                        example: "2nd_half"
                      minuto:
                        type: integer
                        example: 67
                      momento_jogo:
                        type: string
                        example: "Reta final - Momento decisivo"
                      mandante:
                        type: string
                        example: "Flamengo"
                      visitante:
                        type: string
                        example: "Palmeiras"
                      placar:
                        type: object
                        properties:
                          atual:
                            type: string
                            example: "2x1"
                  estatisticas_ao_vivo:
                    type: object
                    properties:
                      mandante:
                        type: object
                        additionalProperties: true
                      visitante:
                        type: object
                        additionalProperties: true
                  must_win:
                    type: object
                    properties:
                      mandante:
                        $ref: "#/components/schemas/MustWin"
                      visitante:
                        $ref: "#/components/schemas/MustWin"
                      analise:
                        type: string
                  sugestoes_ao_vivo:
                    type: array
                    items:
                      type: object
                      properties:
                        tipo:
                          type: string
                          example: "Escanteios"
                        mercado:
                          type: string
                          example: "Projecao: 11.2 escanteios no jogo"
                        justificativa:
                          type: string
                        confianca:
                          type: integer
                          minimum: 1
                          maximum: 5
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalError"

  /fixtures/live/minute-by-minute:
    get:
      summary: Análise minuto a minuto do jogo (timeline)
      description: |
        Timeline completa de eventos e análise por períodos via Sportradar:
        - Todos os eventos (gols, cartões, substituições)
        - Análise por períodos (0-15, 16-30, 31-45, 46-60, 61-75, 76-90+)
        - Identificação de momentos-chave
      operationId: getMinuteByMinuteAnalysis
      tags:
        - fixtures
        - analysis
      parameters:
        - name: fixture
          in: query
          required: true
          description: URN do jogo (ex. sr:sport_event:12345)
          schema:
            type: string
            example: "sr:sport_event:45678901"
      responses:
        "200":
          description: Análise minuto a minuto completa
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    example: true
                  jogo:
                    type: object
                    properties:
                      id:
                        type: string
                      mandante:
                        type: string
                        example: "Flamengo"
                      visitante:
                        type: string
                        example: "Palmeiras"
                      status:
                        type: string
                        example: "FT"
                      placar:
                        type: object
                        properties:
                          mandante:
                            type: integer
                            example: 2
                          visitante:
                            type: integer
                            example: 1
                  timeline_completa:
                    type: array
                    items:
                      type: object
                      properties:
                        minuto:
                          type: integer
                          example: 23
                        minuto_display:
                          type: string
                          example: "23'"
                        tipo:
                          type: string
                          enum: [score_change, yellow_card, red_card, yellow_red_card, substitution, period_start, period_score]
                          example: "score_change"
                        time:
                          type: string
                          example: "Flamengo"
                        jogador:
                          type: string
                          example: "Pedro"
                        descricao:
                          type: string
                  analise_por_periodos:
                    type: object
                    properties:
                      "0-15":
                        type: object
                        properties:
                          gols:
                            type: integer
                          cartoes:
                            type: integer
                          eventos:
                            type: array
                            items:
                              type: object
                              additionalProperties: true
                  momentos_chave:
                    type: array
                    items:
                      type: object
                      properties:
                        periodo:
                          type: string
                          example: "0-15"
                        descricao:
                          type: string
                        impacto:
                          type: string
                          enum: [CRITICO, ALTO, MODERADO, BAIXO]
                  resumo:
                    type: object
                    properties:
                      total_eventos:
                        type: integer
                      total_gols:
                        type: integer
                      total_cartoes:
                        type: integer
                      total_substituicoes:
                        type: integer
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalError"

  /standings:
    get:
      summary: Classificação da competição
      description: |
        Tabela de classificação completa com pontos, vitórias, derrotas, saldo de gols.
        Se `season` não for fornecida, detecta automaticamente a temporada atual (usa 1 req extra).
      operationId: getStandings
      tags:
        - standings
      parameters:
        - name: competition
          in: query
          required: true
          description: URN da competição (ex. sr:competition:325 = Brasileirão Série A)
          schema:
            type: string
            example: "sr:competition:325"
        - name: season
          in: query
          required: false
          description: |
            URN da temporada (ex. sr:season:106479).
            Se omitido, detecta a temporada atual automaticamente.
            Use /seasons para obter os IDs.
          schema:
            type: string
            example: "sr:season:106479"
      responses:
        "200":
          description: Tabela de classificação
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    example: true
                  competition:
                    type: string
                    example: "sr:competition:325"
                  season:
                    type: string
                    example: "sr:season:106479"
                  total:
                    type: integer
                    example: 20
                  classificacao:
                    type: array
                    items:
                      type: object
                      properties:
                        posicao:
                          type: integer
                          example: 1
                        time:
                          type: string
                          example: "Flamengo"
                        time_id:
                          type: string
                          example: "sr:competitor:1234"
                        jogos:
                          type: integer
                          example: 10
                        vitorias:
                          type: integer
                          example: 7
                        empates:
                          type: integer
                          example: 2
                        derrotas:
                          type: integer
                          example: 1
                        gols_pro:
                          type: integer
                          example: 20
                        gols_contra:
                          type: integer
                          example: 8
                        saldo:
                          type: integer
                          example: 12
                        pontos:
                          type: integer
                          example: 23
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalError"

  /teams/statistics:
    get:
      summary: Perfil e plantel de um time
      description: |
        Retorna perfil completo do time (competitor) incluindo plantel de jogadores.
        Use o `time_id` retornado em /standings ou /fixtures para obter o URN correto.
      operationId: getTeamStatistics
      tags:
        - teams
      parameters:
        - name: team
          in: query
          required: true
          description: URN do time no Sportradar (ex. sr:competitor:1234)
          schema:
            type: string
            example: "sr:competitor:1234"
        - name: competition
          in: query
          required: false
          description: URN da competição (opcional, para contexto de temporada)
          schema:
            type: string
            example: "sr:competition:325"
        - name: season
          in: query
          required: false
          description: URN da temporada (opcional)
          schema:
            type: string
            example: "sr:season:106479"
      responses:
        "200":
          description: Perfil e plantel do time
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    example: true
                  team:
                    type: object
                    properties:
                      id:
                        type: string
                        example: "sr:competitor:1234"
                      name:
                        type: string
                        example: "Flamengo"
                      short_name:
                        type: string
                        example: "Flamengo"
                      abbreviation:
                        type: string
                        example: "FLA"
                      country:
                        type: string
                        example: "Brazil"
                      country_code:
                        type: string
                        example: "BRA"
                  jogadores:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                          example: "sr:player:123456"
                        name:
                          type: string
                          example: "Pedro"
                        date_of_birth:
                          type: string
                          example: "1997-11-01"
                        nationality:
                          type: string
                          example: "Brazil"
                        jersey_number:
                          type: string
                          example: "9"
                        position:
                          type: string
                          example: "forward"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalError"

  /players/topscorers:
    get:
      summary: Artilheiros da competição
      description: |
        Jogadores com mais gols na competição/temporada.
        Se `season` não for fornecida, detecta automaticamente.
      operationId: getTopScorers
      tags:
        - players
      parameters:
        - name: competition
          in: query
          required: true
          description: URN da competição (ex. sr:competition:325)
          schema:
            type: string
            example: "sr:competition:325"
        - name: season
          in: query
          required: false
          description: URN da temporada. Se omitido, usa a temporada atual.
          schema:
            type: string
            example: "sr:season:106479"
      responses:
        "200":
          description: Lista de artilheiros
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    example: true
                  competition:
                    type: string
                    example: "sr:competition:325"
                  season:
                    type: string
                    example: "sr:season:106479"
                  total:
                    type: integer
                    example: 20
                  artilheiros:
                    type: array
                    items:
                      type: object
                      properties:
                        jogador:
                          type: string
                          example: "Pedro"
                        jogador_id:
                          type: string
                          example: "sr:player:123456"
                        time:
                          type: string
                          example: "Flamengo"
                        time_id:
                          type: string
                          example: "sr:competitor:1234"
                        gols:
                          type: integer
                          example: 12
                        assistencias:
                          type: integer
                          example: 5
                        jogos:
                          type: integer
                          example: 18
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalError"

  /injuries:
    get:
      summary: Jogadores ausentes (lesionados/suspensos) de uma competição
      description: |
        Retorna jogadores indisponíveis (lesionados ou suspensos) de uma competição/temporada.
        Opcionalmente filtra por time.
        Fonte: Sportradar Season Missing Players endpoint.
      operationId: getInjuries
      tags:
        - teams
      parameters:
        - name: competition
          in: query
          required: true
          description: URN da competição (ex. sr:competition:325)
          schema:
            type: string
            example: "sr:competition:325"
        - name: team
          in: query
          required: false
          description: URN do time para filtrar (ex. sr:competitor:1234). Se omitido, retorna todos os times.
          schema:
            type: string
            example: "sr:competitor:1234"
        - name: season
          in: query
          required: false
          description: URN da temporada. Se omitido, detecta automaticamente.
          schema:
            type: string
            example: "sr:season:106479"
      responses:
        "200":
          description: Lista de jogadores ausentes
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    example: true
                  competition:
                    type: string
                    example: "sr:competition:325"
                  season:
                    type: string
                    example: "sr:season:106479"
                  team_filter:
                    type: string
                    nullable: true
                    example: "sr:competitor:1234"
                  total:
                    type: integer
                    example: 4
                  lesoes:
                    type: array
                    items:
                      type: object
                      properties:
                        time:
                          type: string
                          example: "Flamengo"
                        time_id:
                          type: string
                          example: "sr:competitor:1234"
                        jogador:
                          type: string
                          example: "Everton Ribeiro"
                        jogador_id:
                          type: string
                          example: "sr:player:123456"
                        tipo:
                          type: string
                          example: "injury"
                        lesionado:
                          type: boolean
                          example: true
                        desde:
                          type: string
                          nullable: true
                          example: "2025-01-15"
                        retorno_previsto:
                          type: string
                          nullable: true
                          example: "2025-03-01"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalError"

  /predictions:
    get:
      summary: Probabilidades de resultado de um jogo (Sportradar)
      description: |
        Retorna probabilidades calculadas pelo Sportradar para mercados como 3way (1X2).
        Use o `id` do jogo retornado em /fixtures ou /fixtures/live.
      operationId: getPredictions
      tags:
        - predictions
      parameters:
        - name: fixture
          in: query
          required: true
          description: URN do jogo (ex. sr:sport_event:12345)
          schema:
            type: string
            example: "sr:sport_event:45678901"
      responses:
        "200":
          description: Probabilidades geradas pelo Sportradar
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    example: true
                  jogo:
                    type: object
                    properties:
                      id:
                        type: string
                        example: "sr:sport_event:45678901"
                      data:
                        type: string
                        format: date-time
                      mandante:
                        type: string
                        example: "Flamengo"
                      visitante:
                        type: string
                        example: "Palmeiras"
                  predicoes:
                    type: array
                    items:
                      type: object
                      properties:
                        mercado:
                          type: string
                          example: "3way"
                        resultados:
                          type: array
                          items:
                            type: object
                            properties:
                              resultado:
                                type: string
                                example: "home_team_winner"
                              probabilidade:
                                type: number
                                format: float
                                example: 45.0
                                description: "Probabilidade em porcentagem (0-100)"
                              probabilidade_decimal:
                                type: number
                                format: float
                                example: 0.45
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalError"

  /odds:
    get:
      summary: Odds de casas de apostas (não disponível no plano atual)
      description: |
        Odds de casas de apostas não estão incluídas no pacote Soccer Base do Sportradar.
        Use /predictions para probabilidades calculadas pela Sportradar.
      operationId: getOdds
      tags:
        - predictions
      parameters:
        - name: fixture
          in: query
          required: true
          description: URN do jogo
          schema:
            type: string
            example: "sr:sport_event:45678901"
      responses:
        "503":
          description: Não disponível no plano atual
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    example: false
                  error:
                    type: string
                  alternativa:
                    type: string

  /analysis/corners:
    get:
      summary: Análise de escanteios com fator Must Win
      description: |
        Calcula estimativa de escanteios baseado em posição na tabela e fator Must Win.
        Requer competição e times no formato URN Sportradar.
      operationId: getAnalysisCorners
      tags:
        - analysis
      parameters:
        - name: competition
          in: query
          required: true
          description: URN da competição (ex. sr:competition:325)
          schema:
            type: string
            example: "sr:competition:325"
        - name: team_home
          in: query
          required: true
          description: URN do time mandante (ex. sr:competitor:1234)
          schema:
            type: string
            example: "sr:competitor:1234"
        - name: team_away
          in: query
          required: true
          description: URN do time visitante (ex. sr:competitor:5678)
          schema:
            type: string
            example: "sr:competitor:5678"
        - name: season
          in: query
          required: false
          description: URN da temporada. Se omitido, detecta automaticamente.
          schema:
            type: string
            example: "sr:season:106479"
      responses:
        "200":
          description: Análise de escanteios com fator Must Win
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    example: true
                  analise_escanteios:
                    type: object
                    properties:
                      time_casa:
                        type: object
                        properties:
                          id:
                            type: string
                            example: "sr:competitor:1234"
                          posicao:
                            type: integer
                            nullable: true
                            example: 3
                          pontos:
                            type: integer
                            example: 25
                          must_win:
                            $ref: "#/components/schemas/MustWin"
                      time_fora:
                        type: object
                        properties:
                          id:
                            type: string
                          posicao:
                            type: integer
                            nullable: true
                          must_win:
                            $ref: "#/components/schemas/MustWin"
                      estimativa_total:
                        type: number
                        format: float
                        example: 10.0
                      analise_must_win:
                        type: object
                        properties:
                          impacto:
                            type: string
                          fator_combinado:
                            type: number
                            format: float
                      sugestoes:
                        type: array
                        items:
                          type: object
                          properties:
                            mercado:
                              type: string
                              example: "Over 9.5 Escanteios Totais"
                            confianca:
                              type: number
                              format: float
                              minimum: 1
                              maximum: 5
                            value_estimado:
                              type: string
                              example: "+20%"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalError"

  /analysis/cards:
    get:
      summary: Análise de cartões com fator Must Win
      description: |
        Calcula estimativa de cartões baseado em posição na tabela e fator Must Win.
      operationId: getAnalysisCards
      tags:
        - analysis
      parameters:
        - name: competition
          in: query
          required: true
          description: URN da competição (ex. sr:competition:325)
          schema:
            type: string
            example: "sr:competition:325"
        - name: team_home
          in: query
          required: true
          description: URN do time mandante
          schema:
            type: string
            example: "sr:competitor:1234"
        - name: team_away
          in: query
          required: true
          description: URN do time visitante
          schema:
            type: string
            example: "sr:competitor:5678"
        - name: season
          in: query
          required: false
          description: URN da temporada. Se omitido, detecta automaticamente.
          schema:
            type: string
            example: "sr:season:106479"
      responses:
        "200":
          description: Análise de cartões com fator Must Win
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    example: true
                  analise_cartoes:
                    type: object
                    properties:
                      time_casa:
                        type: object
                        properties:
                          id:
                            type: string
                          posicao:
                            type: integer
                            nullable: true
                          must_win:
                            $ref: "#/components/schemas/MustWin"
                      time_fora:
                        type: object
                        properties:
                          id:
                            type: string
                          posicao:
                            type: integer
                            nullable: true
                          must_win:
                            $ref: "#/components/schemas/MustWin"
                      estimativa_total:
                        type: number
                        format: float
                        example: 5.5
                      analise_must_win:
                        type: object
                        properties:
                          impacto:
                            type: string
                          fator_combinado:
                            type: number
                            format: float
                      sugestoes:
                        type: array
                        items:
                          type: object
                          properties:
                            mercado:
                              type: string
                              example: "Over 5.5 Cartoes Totais"
                            confianca:
                              type: number
                              format: float
                            value_estimado:
                              type: string
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalError"

  /analysis/complete:
    get:
      summary: Análise Completa de um Jogo — SEGUNDO PASSO OBRIGATÓRIO
      description: "Chame para cada jogo com URNs de getFixtures. Retorna classificação, H2H, Must Win, escanteios e cartões. Use mandante_id→team_home, visitante_id→team_away, competicao_id→competition. Nunca informe season."
      operationId: getAnalysisComplete
      tags:
        - analysis
      parameters:
        - name: competition
          in: query
          required: true
          description: URN da competição (ex. sr:competition:325)
          schema:
            type: string
            example: "sr:competition:325"
        - name: team_home
          in: query
          required: true
          description: URN do time mandante (ex. sr:competitor:1234)
          schema:
            type: string
            example: "sr:competitor:1234"
        - name: team_away
          in: query
          required: true
          description: URN do time visitante (ex. sr:competitor:5678)
          schema:
            type: string
            example: "sr:competitor:5678"
        - name: season
          in: query
          required: false
          description: URN da temporada. Se omitido, detecta automaticamente.
          schema:
            type: string
            example: "sr:season:106479"
        - name: fixture
          in: query
          required: false
          description: URN do jogo específico para incluir probabilidades Sportradar
          schema:
            type: string
            example: "sr:sport_event:45678901"
      responses:
        "200":
          description: Análise completa gerada com sucesso
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    example: true
                  jogo:
                    type: object
                    properties:
                      mandante_id:
                        type: string
                        example: "sr:competitor:1234"
                      mandante_nome:
                        type: string
                        example: "Flamengo"
                      visitante_id:
                        type: string
                        example: "sr:competitor:5678"
                      visitante_nome:
                        type: string
                        example: "Palmeiras"
                      competicao_id:
                        type: string
                        example: "sr:competition:325"
                      temporada:
                        type: string
                        example: "sr:season:106479"
                  contexto:
                    type: object
                    properties:
                      classificacao:
                        type: object
                        properties:
                          mandante:
                            type: object
                            properties:
                              posicao:
                                type: integer
                                example: 3
                              pontos:
                                type: integer
                                example: 45
                          visitante:
                            type: object
                            properties:
                              posicao:
                                type: integer
                                example: 8
                              pontos:
                                type: integer
                                example: 32
                          total_times:
                            type: integer
                            example: 20
                      must_win:
                        type: object
                        properties:
                          mandante:
                            $ref: "#/components/schemas/MustWin"
                          visitante:
                            $ref: "#/components/schemas/MustWin"
                          analise:
                            type: string
                            example: "Importancia equilibrada para ambos os times"
                  confronto_direto:
                    type: object
                    properties:
                      total:
                        type: integer
                        example: 10
                      ultimos_jogos:
                        type: array
                        items:
                          type: object
                          properties:
                            data:
                              type: string
                            mandante:
                              type: string
                            visitante:
                              type: string
                            placar:
                              type: string
                              example: "2-1"
                  probabilidades:
                    type: object
                    nullable: true
                    description: Probabilidades Sportradar (apenas se fixture fornecido)
                    properties:
                      mercado:
                        type: string
                        example: "3way"
                      vitoria_mandante:
                        type: number
                        example: 45.0
                      empate:
                        type: number
                        example: 28.0
                      vitoria_visitante:
                        type: number
                        example: 27.0
                  analise_escanteios:
                    type: object
                    additionalProperties: true
                  analise_cartoes:
                    type: object
                    additionalProperties: true
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalError"

  /analysis/value:
    get:
      summary: Calcula Value Bet
      description: |
        Fórmula: (probabilidade × odd) - 1
        - Resultado > 0: Aposta com valor (recomendada)
        - Resultado < 0: Sem valor (evitar)
        Combine com /predictions para obter probabilidades reais.
      operationId: getValueBet
      tags:
        - analysis
      parameters:
        - name: odd
          in: query
          required: true
          description: Odd da casa de apostas (ex. 2.50)
          schema:
            type: number
            format: float
            minimum: 1.01
            example: 2.50
        - name: probability
          in: query
          required: true
          description: Probabilidade estimada (0-1, ex. 0.45 = 45%)
          schema:
            type: number
            format: float
            minimum: 0.01
            maximum: 1.0
            example: 0.45
      responses:
        "200":
          description: Value calculado
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    example: true
                  value:
                    type: number
                    format: float
                    example: 0.125
                    description: "Valor positivo = value bet"
                  interpretation:
                    type: string
                    example: "Value Bet"
                  recommendation:
                    type: string
                    enum: [Apostar, Evitar]
                    example: "Apostar"
                  formula:
                    type: string
                    example: "(0.45 x 2.50) - 1 = 0.125"
        "400":
          $ref: "#/components/responses/BadRequest"

  /news/context:
    get:
      summary: Notícias recentes de um time
      description: |
        Busca notícias relevantes sobre lesões, suspensões, mudanças técnicas.
        Fontes: GE Globo, ESPN Brasil.
        Requer variável de ambiente NEWS_API_KEY configurada.
      operationId: getNewsContext
      tags:
        - news
      parameters:
        - name: team
          in: query
          required: true
          description: Nome do time (ex. Flamengo)
          schema:
            type: string
            example: "Flamengo"
        - name: league
          in: query
          required: false
          description: Nome da liga para refinar a busca
          schema:
            type: string
            example: "Brasileirao"
        - name: days
          in: query
          required: false
          description: Últimos N dias de notícias (1-30)
          schema:
            type: integer
            default: 3
            minimum: 1
            maximum: 30
            example: 3
      responses:
        "200":
          description: Notícias encontradas
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    example: true
                  team:
                    type: string
                    example: "Flamengo"
                  days_searched:
                    type: integer
                    example: 3
                  total:
                    type: integer
                    example: 4
                  noticias:
                    type: array
                    items:
                      type: object
                      properties:
                        titulo:
                          type: string
                        fonte:
                          type: string
                          example: "GE - Globo Esporte"
                        publicado_em:
                          type: string
                          format: date-time
                        url:
                          type: string
                          format: uri
        "400":
          $ref: "#/components/responses/BadRequest"
        "503":
          description: NEWS_API_KEY não configurada

components:
  schemas:
    ErrorResponse:
      type: object
      properties:
        ok:
          type: boolean
          example: false
        error:
          type: string
          example: "Mensagem de erro"

    MustWin:
      type: object
      description: Fator de pressão por resultado do time
      properties:
        score:
          type: number
          format: float
          minimum: 0
          maximum: 10
          example: 7.5
          description: "Score de 0-10 indicando pressão por resultado"
        nivel:
          type: string
          enum: [CRITICO, ALTO, MODERADO, BAIXO]
          example: "ALTO"
        fatores:
          type: array
          items:
            type: object
            properties:
              fator:
                type: string
                example: "Zona de Rebaixamento"
              impacto:
                type: string
                example: "CRITICO"
              descricao:
                type: string
        recomendacao:
          type: string
          example: "Time precisa pontuar. Fator motivacional significativo."

  responses:
    BadRequest:
      description: Parâmetro inválido ou ausente
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            ok: false
            error: "Parametro 'competition' e obrigatorio (ex: sr:competition:325)"

    InternalError:
      description: Erro interno ou falha na Sportradar API
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            ok: false
            error: "Falha apos 3 tentativas: HTTP 503"
